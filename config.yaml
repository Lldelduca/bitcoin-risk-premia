# Sample window
sample:
  start_date: "2020-01-13"
  end_date: "2023-08-31"

# Data paths
paths:
  # Base Directories
  data_root: "data"
  raw_dir: "data/raw"
  cleaned_dir: "data/cleaned"

  # Raw Data Sources  
  raw_cme_csv: "data/raw/cme/btc_future_options_data.csv"
  raw_cme_parquet: "data/raw/cme/btc_future_options_data.parquet"
  zero_curve: "data/raw/cme/Zero_curve_USD.csv"
  raw_deribit_dir: "data/raw/deribit/"
  raw_hyperliquid_dir: "data/raw/hyperliquid/"

  # Cleaned / Auxiliary Outputs
  cleaned_cme: "data/cleaned/cme_options_clean.parquet"
  cleaned_deribit: "data/cleaned/deribit_options_clean.parquet"
  cleaned_auxiliary: "data/cleaned/auxiliary_panel.parquet"
  deribit_daily_basis: "data/cleaned/deribit_daily_basis.parquet"
  funding_deribit: "data/cleaned/funding_deribit.parquet"
  funding_diff: "data/cleaned/funding_diff.parquet"

  # Results Directories
  results_data: "results/data"
  data_phase1: "data/phase1"
  results_phase1: "results/phase1"
  data_phase2: "data/phase2"
  results_phase2: "results/phase2"
  data_phase3: "data/phase3"
  results_phase3: "results/phase3"
  data_phase4: "data/phase4"
  results_phase4: "results/phase4"
  data_phase5: "data/phase5"  
  results_phase5: "results/phase5"

# Filters common to both datasets (applied before dataset-specific filters)
filters_shared:
  min_tau_days: 10           # Drops options < 10 days to expiry
  max_tau_days: 180          # Focuses on liquid maturities
  moneyness_trim: 3.0        # Keeps |κ| ≤ 3 * sqrt(τ)
  min_iv: 0.01               # 1% annualized lower bound
  max_iv: 5.0                # 500% annualized upper bound

# CME-specific filters (transaction-level quote data)
filters_cme:
  min_volume: 0              # Used in OR logic with min_open_interest
  min_open_interest: 1       # Drops dead/stale contracts (OR vol≥1)
  ivydb_sentinel: -99.99     # IvyDB missing-value convention

# Deribit-specific filters (transaction-level trade data)
filters_deribit:
  min_amount: 0.0            # Drop zero-quantity transactions
  min_n_trades_per_slice: 1  # Drop daily slices with < N trades

# SSVI fitting parameters
ssvi:
  min_options_per_slice: 4

# Tensor PCA
tensor_grid:
  k_grid_min: -0.60
  k_grid_max: 0.70
  k_grid_points: 27
  maturity_grids:
    almeida: [9, 27, 45]                            
    broad: [14, 21, 27, 35, 45, 60, 90, 120, 180] 

# API keys
api_keys:
  fred: "650fd0400ae3c131cb5f2de455f7c098"

# Shared gross-return grid for Phases 2, 3, and 5
return_grid:
  min: 0.40
  max: 2.00
  points: 1000