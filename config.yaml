paths:
  # CME Paths
  raw_cme_csv: "data/raw/cme/btc_future_options_data.csv"
  raw_cme_parquet: "data/raw/cme/btc_future_options_data.parquet"
  zero_curve: "data/raw/cme/Zero_curve_USD.csv"
  cleaned_cme: "data/cleaned/cme_options_clean.parquet"
  
  # Deribit Paths
  raw_deribit_dir: "data/raw/deribit/"
  cleaned_deribit: "data/cleaned/deribit_options_clean.parquet"
  
  # Auxiliary Paths
  raw_hyperliquid_dir: "data/raw/hyperliquid/"
  cleaned_auxiliary: "data/cleaned/auxiliary_panel.parquet"

filters:
  min_volume: 0              # Excludes zero-volume illiquidity
  min_open_interest: 1       # Drops dead/stale contracts
  min_tau_days: 10           # Drops options < 1 week to expiry
  max_tau_days: 180          # Focuses on liquid maturities (approx 6 months)
  moneyness_trim: 3.0        # Keeps |k| <= 3 * sqrt(tau)